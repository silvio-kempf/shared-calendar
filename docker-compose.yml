version: '3.8'

services:
  backend:
    build: ./backend
    volumes:
      - calendar_data:/app/data
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key-in-production}
      - DATABASE_URL=sqlite:///./data/calendar.db
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-}
    restart: unless-stopped
    networks:
      - calendar_net

  frontend:
    build: ./frontend
    ports:
      - "${PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - calendar_net

volumes:
  calendar_data:

networks:
  calendar_net:
